name: Tests

on:
    pull_request:
    push:
        branches:
            - main
            - master
            - dev

jobs:
    test:
        name: Running unit tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5
            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.x
            - name: Use Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24.x
                  cache: pnpm
            - name: Install
              run: pnpm install --no-frozen-lockfile
            - name: Test
              run: pnpm test
